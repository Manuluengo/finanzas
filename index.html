<body>
<div id="root"></div>
<script>
// Constants, theme, helpers — no JSX, loads instantly

// ─── Storage ──────────────────────────────────────────────────────────────────
const SK = {
  saldos:      "fin-saldos-v1",
  movs:        "fin-movimientos-v1",
  planes:      "fin-planes-v1",
  programados: "fin-programados-v1",
  confirmados: "fin-confirmados-v1",
  apikey:      "fin-api-key",
  chat:        "fin-chat-v1",
};

// ─── Data ─────────────────────────────────────────────────────────────────────
const BOLSILLOS = [
  { id:"efectivo", nombre:"Efectivo",     emoji:"💵", moneda:"ARS", color:"#00C9A7" },
  { id:"dolares",  nombre:"Dólares",      emoji:"💲", moneda:"USD", color:"#FFB347" },
  { id:"banco",    nombre:"Banco",        emoji:"🏦", moneda:"ARS", color:"#6B8CFF" },
  { id:"mp",       nombre:"Mercado Pago", emoji:"📱", moneda:"ARS", color:"#A78BFA" },
];

const CATS = [
  {id:"comida",    nombre:"Comida",     emoji:"🍔", keys:["comida","almuerzo","cena","restaurant","pizza","delivery","super"]},
  {id:"transporte",nombre:"Transporte", emoji:"🚇", keys:["uber","taxi","colectivo","subte","nafta"]},
  {id:"gym",       nombre:"Gym",        emoji:"🏋️", keys:["gym","proteína","suplemento","whey","creatina"]},
  {id:"contenido", nombre:"Contenido",  emoji:"📲", negocio:true, keys:["contenido","reel","foto","equipo","ads"]},
  {id:"salidas",   nombre:"Salidas",    emoji:"🎉", keys:["salida","bar","boliche","cerveza","birra"]},
  {id:"servicios", nombre:"Servicios",  emoji:"🏠", keys:["alquiler","expensa","luz","gas","internet"]},
  {id:"salud",     nombre:"Salud",      emoji:"💊", keys:["farmacia","médico","medicamento"]},
  {id:"ropa",      nombre:"Ropa",       emoji:"👕", keys:["ropa","zapatilla","camisa","jean"]},
  {id:"subs",      nombre:"Suscripciones", emoji:"📦", keys:["netflix","spotify","suscripción","adobe"]},
  {id:"otro",      nombre:"Otro",       emoji:"🔧", keys:[]},
];

const FUENTES = [
  {id:"bar",     nombre:"The Oldest Bar", emoji:"🍺", keys:["bar","oldest","trabajo"]},
  {id:"canje",   nombre:"Canje / Marca",  emoji:"🤝", keys:["canje","marca","regalo"]},
  {id:"campana", nombre:"Campaña paga",   emoji:"💰", keys:["campaña","cobré","cobr","pago"]},
  {id:"otro",    nombre:"Otro",           emoji:"➕", keys:[]},
];

const DIAS = [
  {val:1,lbl:"Lu"},{val:2,lbl:"Ma"},{val:3,lbl:"Mi"},
  {val:4,lbl:"Ju"},{val:5,lbl:"Vi"},{val:6,lbl:"Sá"},{val:0,lbl:"Do"},
];

const PLAN_EMOJIS = ["✈️","🏠","🚗","💻","👟","🏝️","📷","💍","🎸","💎","🎓","🛵","🏋️","🎮","👜"];

// ─── Theme ────────────────────────────────────────────────────────────────────
const C = {
  bg:          "#060A0E",
  glass:       "rgba(255,255,255,0.05)",
  glassBorder: "rgba(255,255,255,0.09)",
  glassSpec:   "rgba(255,255,255,0.13)",
  glassTeal:   "rgba(0,201,167,0.08)",
  glassTealB:  "rgba(0,201,167,0.18)",
  teal:        "#00C9A7",
  muted:       "#5A7A8A",
  text:        "#E8F0F5",
  dim:         "#98B0BC",
  red:         "#FF6B6B",
  warn:        "#FFB347",
  blue:        "#6B8CFF",
};

function gCard(extra) {
  return Object.assign({
    background: C.glass,
    backdropFilter: "blur(28px) saturate(1.8)",
    WebkitBackdropFilter: "blur(28px) saturate(1.8)",
    border: "1px solid " + C.glassBorder,
    boxShadow: "inset 0 1px 0 " + C.glassSpec + ", 0 20px 50px rgba(0,0,0,0.35)",
    borderRadius: 22,
  }, extra || {});
}

function gTeal(extra) {
  return Object.assign({
    background: C.glassTeal,
    backdropFilter: "blur(28px)",
    WebkitBackdropFilter: "blur(28px)",
    border: "1px solid " + C.glassTealB,
    boxShadow: "inset 0 1px 0 rgba(0,201,167,0.2), 0 8px 30px rgba(0,201,167,0.08)",
    borderRadius: 22,
  }, extra || {});
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtARS(n) {
  return new Intl.NumberFormat("es-AR", {style:"currency", currency:"ARS", minimumFractionDigits:0, maximumFractionDigits:0}).format(n || 0);
}
function fmtUSD(n) {
  return new Intl.NumberFormat("en-US", {style:"currency", currency:"USD", minimumFractionDigits:0, maximumFractionDigits:2}).format(n || 0);
}
function fmtNum(n) {
  return new Intl.NumberFormat("es-AR", {minimumFractionDigits:0, maximumFractionDigits:0}).format(n || 0);
}
function today() { return new Date().toISOString().slice(0,10); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function loadJ(k, d) { try { return JSON.parse(localStorage.getItem(k) || "null") ?? d; } catch(e) { return d; } }
function saveJ(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function calcTotal(s, d) {
  return BOLSILLOS.filter(b => b.moneda === "ARS").reduce((t,b) => t + (s[b.id] || 0), 0) + (s.dolares || 0) * (d || 0);
}
function greeting() {
  const h = new Date().getHours();
  return h < 13 ? "Buenos días" : h < 20 ? "Buenas tardes" : "Buenas noches";
}
function fmtMesAnio(d) {
  return d ? d.toLocaleDateString("es-AR", {month:"long", year:"numeric"}) : null;
}
function getBolsillo(id) { const b = BOLSILLOS.find(b => b.id === id); return b ? b.emoji + " " + b.nombre : "—"; }
function getCatName(id)  { const c = CATS.find(c => c.id === id);      return c ? c.emoji + " " + c.nombre : "—"; }
function getFuente(id)   { const f = FUENTES.find(f => f.id === id);    return f ? f.emoji + " " + f.nombre : "—"; }
function fmtFecha(f) {
  return new Date(f + "T12:00:00").toLocaleDateString("es-AR", {weekday:"short", day:"numeric", month:"short"});
}

function parseNL(t) {
  const s = t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const nm = s.match(/\$?([\d]+(?:[.,]\d+)?)/);
  const monto = nm ? parseFloat(nm[1].replace(/\./g,"").replace(",",".")) : null;
  let tipo = null;
  if (/gaste|pague|compre|salio/.test(s)) tipo = "gasto";
  else if (/cobre|ingrese|entro|recibi/.test(s)) tipo = "ingreso";
  let catId = "otro";
  for (const c of CATS) { if (c.keys.some(k => s.includes(k))) { catId = c.id; break; } }
  let fuenteId = "otro";
  for (const f of FUENTES) { if (f.keys.some(k => s.includes(k))) { fuenteId = f.id; break; } }
  let bolsilloId = "efectivo";
  if (/(banco|transferencia|cuenta)/.test(s)) bolsilloId = "banco";
  if (/(mercado.?pago|\bmp\b)/.test(s))       bolsilloId = "mp";
  if (/(dolar|usd)/.test(s))                  bolsilloId = "dolares";
  return {tipo, monto, catId, fuenteId, bolsilloId};
}

function getPlanData(plan) {
  const falta = Math.max(0, plan.objetivo - plan.acumulado);
  const pct   = plan.objetivo > 0 ? Math.min(100, plan.acumulado / plan.objetivo * 100) : 0;
  const hoy   = new Date();
  let porMes = null, mesesRestantes = null, fechaEstimada = null;
  if (plan.modo === "fecha" && plan.fechaObjetivo) {
    const fechaObj = new Date(plan.fechaObjetivo + "T12:00:00");
    mesesRestantes = Math.max(1, Math.ceil((fechaObj - hoy) / (30 * 864e5)));
    porMes = falta > 0 ? falta / mesesRestantes : 0;
    fechaEstimada = fechaObj;
  } else if (plan.modo === "mensual" && plan.porMes) {
    porMes = plan.porMes;
    mesesRestantes = plan.porMes > 0 && falta > 0 ? Math.ceil(falta / plan.porMes) : 0;
    fechaEstimada = new Date(Date.now() + mesesRestantes * 30 * 864e5);
  }
  return {falta, pct, porMes, mesesRestantes, fechaEstimada};
}

function getSpendingPace(movs) {
  const now = new Date();
  const dom = now.getDate();
  if (dom < 5) return null;
  const dim = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const monthStart = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-01";
  const prevStart  = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().slice(0,10);
  const gastoMes   = movs.filter(m => m.tipo==="gasto" && m.fecha >= monthStart).reduce((s,m) => s+m.monto, 0);
  const gastoPrev  = movs.filter(m => m.tipo==="gasto" && m.fecha >= prevStart && m.fecha < monthStart).reduce((s,m) => s+m.monto, 0);
  if (gastoPrev < 1000) return null;
  const proyectado = gastoMes / dom * dim;
  return {gastoMes, proyectado, gastoPrev, ratio: proyectado / gastoPrev, dom};
}

function calcScore(tasaAhorro, runway, saldos, dolar, movs) {
  const s1 = Math.max(0, Math.min(25, tasaAhorro / 20 * 25));
  const s2 = Math.min(25, runway / 6 * 25);
  const total = calcTotal(saldos, dolar);
  const pctUSD = dolar && total > 0 ? (saldos.dolares || 0) * dolar / total * 100 : 0;
  const s3 = Math.min(25, pctUSD / 15 * 25);
  const c3m = new Date(Date.now() - 90*864e5).toISOString().slice(0,10);
  const src = new Set(movs.filter(m => m.tipo==="ingreso" && m.fecha >= c3m).map(m => m.fuenteId)).size;
  const s4 = src === 0 ? 0 : src === 1 ? 12 : Math.min(25, src * 12);
  return {total: Math.round(s1+s2+s3+s4), s1: Math.round(s1), s2: Math.round(s2), s3: Math.round(s3), s4: Math.round(s4)};
}

function scoreLabel(s) {
  if (s < 25) return "Arranque 🌱";
  if (s < 45) return "En construcción 🔨";
  if (s < 65) return "Buen camino 📈";
  if (s < 82) return "Muy sólido 💪";
  return "Crack financiero 🏆";
}
function scoreColor(s) {
  return s < 30 ? C.red : s < 55 ? C.warn : s < 75 ? C.blue : C.teal;
}

function buildInsights(saldos, movs, dolar, avgGasto, avgAhorro, tasaAhorro, runway, i3m) {
  const out = [];
  if (movs.length < 3) {
    out.push({tipo:"info", titulo:"Empezá a registrar", txt:"Con pocos datos todavía no puedo darte consejos precisos. En unos días ya tengo mucho más para mostrarte."});
    return out;
  }
  if (tasaAhorro < 0) {
    out.push({tipo:"danger", titulo:"Gastás más de lo que entra", txt:"En promedio te faltan " + fmtARS(Math.abs(avgAhorro)) + " por mes. Lo primero es encontrar de dónde recortar."});
  } else if (tasaAhorro < 10) {
    out.push({tipo:"warn", titulo:"Casi no estás guardando plata", txt:"De cada $100 que ganás, guardás $" + tasaAhorro.toFixed(0) + ". Lo mínimo recomendado es $20 de cada $100. Pequeños cambios hacen diferencia."});
  } else if (tasaAhorro < 20) {
    out.push({tipo:"warn", titulo:"Ahorrás, pero hay margen", txt:"De cada $100 que ganás, guardás $" + tasaAhorro.toFixed(0) + ". Bien — si llegás a $20 de cada $100, la diferencia en un año es enorme."});
  } else {
    out.push({tipo:"ok", titulo:"Estás guardando bien", txt:"De cada $100 que ganás, guardás $" + tasaAhorro.toFixed(0) + ". Por encima de lo recomendado. Seguí así."});
  }
  if (avgGasto > 0) {
    if (runway < 1) {
      out.push({tipo:"danger", titulo:"Sin colchón de emergencia", txt:"Con lo que tenés hoy aguantás menos de 1 mes sin que entre plata. Prioridad número uno: llegar a tener 3 meses guardados (" + fmtARS(avgGasto*3) + ")."});
    } else if (runway < 3) {
      out.push({tipo:"warn", titulo:"Tu colchón todavía es chico", txt:"Podés aguantar " + runway.toFixed(1) + " meses sin trabajar. Para estar tranquilo, lo ideal son 3-6 meses de reserva (" + fmtARS(avgGasto*3) + "–" + fmtARS(avgGasto*6) + ")."});
    } else {
      out.push({tipo:"ok", titulo:"Buena reserva de emergencia", txt:"Tenés para aguantar " + runway.toFixed(1) + " meses sin ingresos. Podés empezar a planificar objetivos más grandes."});
    }
  }
  const c1m = new Date(Date.now() - 30*864e5).toISOString().slice(0,10);
  const g1m = movs.filter(m => m.tipo==="gasto" && m.fecha >= c1m);
  const tg1m = g1m.reduce((s,m) => s+m.monto, 0);
  if (tg1m > 0) {
    const top = CATS.map(c => ({...c, t: g1m.filter(m => m.catId===c.id).reduce((s,m) => s+m.monto, 0)})).sort((a,b) => b.t-a.t)[0];
    if (top && top.t > tg1m * 0.28) {
      const pot = top.t * 0.25;
      out.push({tipo:"info", titulo: top.emoji + " " + top.nombre + " se lleva mucho", txt:"Este mes, de cada $100 que gastaste, $" + (top.t/tg1m*100).toFixed(0) + " fueron en " + top.nombre.toLowerCase() + ". Si lo bajás un 25%, ahorrarías " + fmtARS(pot) + " extra por mes."});
    }
  }
  const total = calcTotal(saldos, dolar);
  if (dolar && total > 0) {
    const ars = BOLSILLOS.filter(b => b.moneda==="ARS").reduce((s,b) => s+(saldos[b.id]||0), 0);
    if (ars/total > 0.92) {
      out.push({tipo:"info", titulo:"Toda la plata en pesos", txt:"Casi todo lo que tenés está en pesos, que pierden valor con el tiempo. Tener aunque sea el 10-15% en dólares es como un seguro."});
    }
  }
  return out;
}

function getPendientes(programados, confirmados) {
  const now = new Date();
  const fecha = now.toISOString().slice(0,10);
  const dia = now.getDay();
  const hora = now.getHours();
  return programados.filter(p => {
    if (!p.activo || !p.diasSemana.includes(dia) || hora < p.horaActivacion) return false;
    return !confirmados[p.id + "|" + fecha];
  });
}

function buildFinancialContext(saldos, movs, dolar, planes) {
  const total = calcTotal(saldos, dolar);
  const c3m = new Date(Date.now() - 90*864e5).toISOString().slice(0,10);
  const m3m = movs.filter(m => m.fecha >= c3m);
  const g3m = m3m.filter(m => m.tipo==="gasto").reduce((s,m) => s+m.monto, 0);
  const i3m = m3m.filter(m => m.tipo==="ingreso").reduce((s,m) => s+m.monto, 0);
  const meses = Math.max(1, m3m.length > 0 ? 3 : 1);
  const avgGasto = g3m / meses;
  const avgIngreso = i3m / meses;
  const tasa = i3m > 0 ? ((i3m - g3m) / i3m * 100).toFixed(0) : "0";
  const runway = avgGasto > 0 ? (total / avgGasto).toFixed(1) : "—";
  const c1m = new Date(Date.now() - 30*864e5).toISOString().slice(0,10);
  const g1m = movs.filter(m => m.tipo==="gasto" && m.fecha >= c1m);
  const cats = CATS.map(c => ({...c, t: g1m.filter(m => m.catId===c.id).reduce((s,m) => s+m.monto, 0)})).filter(c => c.t > 0).sort((a,b) => b.t-a.t).slice(0,3);
  const planesStr = planes.length > 0
    ? planes.map(p => "- " + p.emoji + " " + p.nombre + ": guardé " + fmtARS(p.acumulado) + " de " + fmtARS(p.objetivo) + " (" + (p.acumulado/p.objetivo*100).toFixed(0) + "%)").join("\n")
    : "- Sin planes configurados";
  return "Sos el coach financiero personal de Manu, 25 años, Buenos Aires.\n" +
    "Respondé siempre en español argentino, simple y directo, sin tecnicismos. Tratalo de vos.\n" +
    "Sé concreto y específico con sus números reales cuando sea útil.\n\n" +
    "SITUACIÓN FINANCIERA ACTUAL:\n" +
    "- Patrimonio total: " + fmtARS(total) + "\n" +
    "- Efectivo: " + fmtARS(saldos.efectivo||0) + "\n" +
    "- Dólares: " + fmtUSD(saldos.dolares||0) + (dolar ? " = " + fmtARS((saldos.dolares||0)*dolar) : "") + "\n" +
    "- Banco: " + fmtARS(saldos.banco||0) + "\n" +
    "- Mercado Pago: " + fmtARS(saldos.mp||0) + "\n" +
    (dolar ? "- Dólar blue hoy: $" + fmtNum(dolar) + "\n" : "") +
    "\nPROMEDIOS MENSUALES (últimos 3 meses):\n" +
    "- Ingresos: " + fmtARS(avgIngreso) + "/mes\n" +
    "- Gastos: " + fmtARS(avgGasto) + "/mes\n" +
    "- De cada $100 que gana, guarda: $" + tasa + "\n" +
    "- Meses de reserva: " + runway + "\n" +
    "\nTOP GASTOS (último mes):\n" +
    (cats.length > 0 ? cats.map(c => "- " + c.emoji + " " + c.nombre + ": " + fmtARS(c.t)).join("\n") : "- Sin datos suficientes") +
    "\n\nPLANES DE AHORRO:\n" + planesStr +
    "\n\nRespondé de forma concisa (máximo 3-4 párrafos). Si te preguntan algo que no sea finanzas, redirigí amablemente.";
}

// ════════════════════════════════════════════════════════════════════════════
// UI ATOMS
// ════════════════════════════════════════════════════════════════════════════

function getWasteAlerts(movs) {
  const now = new Date();
  const monthStart = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-01";
  const prevStart  = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().slice(0,10);
  const WASTE_CATS = [
    {id:"comida",    label:"comida y delivery",   emoji:"🍔", umbral:4},
    {id:"salidas",   label:"salidas y diversión",  emoji:"🎉", umbral:4},
    {id:"subs",      label:"suscripciones",        emoji:"📦", umbral:2},
    {id:"ropa",      label:"ropa",                 emoji:"👕", umbral:3},
  ];
  const alerts = [];
  WASTE_CATS.forEach(cat => {
    const mes   = movs.filter(m => m.tipo==="gasto" && m.catId===cat.id && m.fecha>=monthStart);
    const hist  = movs.filter(m => m.tipo==="gasto" && m.catId===cat.id && m.fecha>=prevStart && m.fecha<monthStart);
    const total = mes.reduce((s,m) => s+m.monto, 0);
    const prev  = hist.reduce((s,m) => s+m.monto, 0);
    const count = mes.length;
    if (total < 3000) return;
    const frequent  = count >= cat.umbral;
    const excessive = prev > 0 && total > prev * 1.3;
    if (frequent || excessive) {
      alerts.push({
        catId:  cat.id,
        label:  cat.label,
        emoji:  cat.emoji,
        total,
        prev,
        count,
        annual: total * 12,
        pct:    prev > 0 ? ((total/prev-1)*100).toFixed(0) : null,
        exceso: prev > 0 ? Math.max(0, total - prev) : null,
      });
    }
  });
  return alerts;
}

</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

function Chip({ selected, onClick, emoji, label }) {
  return (
    <div onClick={onClick} style={{
      background: selected ? "rgba(0,201,167,0.12)" : "rgba(255,255,255,0.03)",

      borderRadius: 12, padding: "11px 6px", cursor: "pointer", textAlign: "center",
    }}>
      <div style={{fontSize:20, marginBottom:3}}>{emoji}</div>
      <div style={{color: selected ? C.teal : C.muted, fontSize:10, fontWeight:600, lineHeight:1.2}}>{label}</div>
    </div>
  );
}

function Lbl({ children }) {
  return <div style={{color:C.muted, fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8}}>{children}</div>;
}

// ════════════════════════════════════════════════════════════════════════════
// CONFIRMACION MODAL
// ════════════════════════════════════════════════════════════════════════════
function ConfirmacionModal({ pendiente, onConfirm, onSaltar }) {
  const [monto, setMonto] = useState(String(pendiente.monto));
  const fuente   = FUENTES.find(f => f.id === pendiente.fuenteId);
  const bolsillo = BOLSILLOS.find(b => b.id === pendiente.bolsilloId);
  const n = parseFloat(monto) || pendiente.monto;
  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:16}}>💰 Ingreso programado</div>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:6}}>

        <div style={{color:C.dim,fontSize:14,margin:"14px 0"}}>¿Recibiste este ingreso hoy? Podés cambiar el monto si hubo diferencia.</div>

          <span style={{color:"rgba(0,201,167,0.6)",fontSize:26,fontWeight:200,marginRight:6}}>$</span>
          <input type="number" inputMode="decimal" value={monto} onChange={e=>setMonto(e.target.value)}
            style={{border:"none",outline:"none",background:"transparent",color:C.text,fontSize:36,fontWeight:200,width:"100%",letterSpacing:"-0.02em",fontFamily:"DM Sans, sans-serif"}}/>
        </div>

          ✓ Sí, recibí {fmtARS(n)}

      </div>

  );
}

<script type="text/babel" data-presets="react">
function InicioTab({ saldos, movs, dolar, dolarTime, onQuickSave }) {
  const [nlText,    setNlText]    = useState("");
  const [parsed,    setParsed]    = useState(null);
  const [confirmed, setConfirmed] = useState(false);

  const total    = calcTotal(saldos, dolar);
  const cutoff   = new Date(Date.now() - 30*864e5).toISOString().slice(0,10);
  const g30      = movs.filter(m => m.tipo==="gasto"   && m.fecha >= cutoff).reduce((s,m) => s+m.monto, 0);
  const i30      = movs.filter(m => m.tipo==="ingreso" && m.fecha >= cutoff).reduce((s,m) => s+m.monto, 0);
  const ahorro   = i30 - g30;
  const segs     = BOLSILLOS.map(b => ({...b, val: b.moneda==="USD" ? (saldos[b.id]||0)*(dolar||0) : (saldos[b.id]||0)})).filter(s => s.val > 0);
  const barTotal = segs.reduce((s,x) => s+x.val, 0);
  const catBreak = CATS.map(c => ({...c, total: movs.filter(m => m.tipo==="gasto" && m.catId===c.id && m.fecha>=cutoff).reduce((s,m) => s+m.monto, 0)})).filter(c => c.total > 0).sort((a,b) => b.total-a.total).slice(0,5);
  const pace        = getSpendingPace(movs);
  const wasteAlerts = getWasteAlerts(movs);
  const tipColor = {danger:C.red, warn:C.warn, ok:C.teal, info:C.blue};

  function handleNLSubmit() {
    if (!nlText.trim()) return;
    const p = parseNL(nlText);
    if (p.tipo && p.monto) setParsed(p); else setParsed({error:true});
  }

  function handleNLConfirm() {
    if (!parsed || parsed.error) return;
    const negocio = parsed.tipo==="gasto" && !!CATS.find(c => c.id===parsed.catId && c.negocio);
    const mov = {id:uid(), tipo:parsed.tipo, monto:parsed.monto, fecha:today(), nota:nlText.slice(0,60), negocio};
    if (parsed.tipo==="gasto")   { mov.catId = parsed.catId; mov.bolsilloId = parsed.bolsilloId; }
    if (parsed.tipo==="ingreso") { mov.fuenteId = parsed.fuenteId; mov.bolsilloId = parsed.bolsilloId; }
    onQuickSave(mov);
    setNlText(""); setParsed(null); setConfirmed(true);
    setTimeout(() => setConfirmed(false), 2000);
  }

  return (
    <div style={{paddingBottom:110}}>
      <div style={{padding:"0 20px 6px"}}>
        <div style={{color:C.muted,fontSize:14}}>{greeting()},</div>
        <div style={{color:C.text,fontSize:28,fontWeight:700,letterSpacing:"-0.02em",lineHeight:1.1}}>Manu 👋</div>
      </div>

      {pace && pace.ratio > 1.2 && (
        <div style={Object.assign(gCard({borderRadius:16, borderLeft:"3px solid "+C.red}), {margin:"12px 16px 0", padding:"13px 16px"})}>
          <div style={{color:C.red,fontWeight:700,fontSize:14,marginBottom:4}}>⚠️ Ritmo de gasto alto</div>
          <div style={{color:C.dim,fontSize:13}}>Van {pace.dom} días y ya gastaste {fmtARS(pace.gastoMes)}. Si seguís así, cerrarías el mes en {fmtARS(pace.proyectado)} — un {((pace.ratio-1)*100).toFixed(0)}% más que el mes pasado.</div>
        </div>
      )}
      {pace && pace.ratio < 0.75 && (
        <div style={Object.assign(gCard({borderRadius:16, borderLeft:"3px solid "+C.teal}), {margin:"12px 16px 0", padding:"13px 16px"})}>
          <div style={{color:C.teal,fontWeight:700,fontSize:14,marginBottom:4}}>✨ Mes liviano</div>
          <div style={{color:C.dim,fontSize:13}}>Van {pace.dom} días y gastaste bastante menos de lo normal. Este mes te va a sobrar plata extra — mirá el Asesor para ideas.</div>
        </div>
      )}


      {wasteAlerts && wasteAlerts.length > 0 && wasteAlerts.map((a,i) => (
        <div key={i} style={Object.assign(gCard({borderRadius:16, borderLeft:"3px solid "+C.red}), {margin:"10px 16px 0",padding:"13px 16px"})}>
          <div style={{color:C.red,fontWeight:700,fontSize:14,marginBottom:4}}>
            {a.emoji} Estás gastando mucho en {a.label}
          </div>
          <div style={{color:C.dim,fontSize:13,lineHeight:1.6}}>
            {a.count > 1 && <span>{a.count} veces este mes · </span>}{fmtARS(a.total)}
            {a.pct && <span> — {a.pct}% más que el mes pasado</span>}
            {a.exceso && a.exceso > 0 && <span>. Estás gastando {fmtARS(a.exceso)} de más.</span>}
            {" Si seguís así: "+fmtARS(a.annual)+" al año en esto."}
          </div>
        </div>
      ))}

      <div style={Object.assign(gTeal({borderRadius:24}), {margin:"12px 16px 0", padding:"22px 22px 18px"})}>
        <div style={{color:"rgba(0,201,167,0.7)",fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Patrimonio total</div>
        <div style={{color:C.text,fontSize:42,fontWeight:200,letterSpacing:"-0.03em",lineHeight:1}}>{fmtARS(total)}</div>
        {dolar && (saldos.dolares||0) > 0 && <div style={{color:"rgba(0,201,167,0.6)",fontSize:12,marginTop:6}}>incluye {fmtUSD(saldos.dolares)} al blue</div>}
        {barTotal > 0 && (
          <>
            <div style={{marginTop:18,borderRadius:99,overflow:"hidden",height:5,display:"flex",gap:2}}>
              {segs.map(s => <div key={s.id} style={{width:(s.val/barTotal*100)+"%",background:s.color,borderRadius:99,minWidth:2}}/>)}
            </div>
            <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}}>
              {segs.map(s => (
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:s.color}}/>
                  <span style={{color:"rgba(255,255,255,0.4)",fontSize:10}}>{s.emoji} {(s.val/barTotal*100).toFixed(0)}%</span>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"10px 16px 0"}}>
        {BOLSILLOS.map(b => (
          <div key={b.id} style={Object.assign(gCard({borderRadius:18}), {padding:"16px 14px",position:"relative",overflow:"hidden"})}>
            <div style={{position:"absolute",top:-20,right:-20,width:70,height:70,borderRadius:"50%",background:b.color,opacity:0.06,filter:"blur(16px)"}}/>
            <div style={{fontSize:20,marginBottom:8}}>{b.emoji}</div>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>{b.nombre}</div>
            <div style={{color:C.text,fontSize:17,fontWeight:600}}>{b.moneda==="USD" ? fmtUSD(saldos[b.id]||0) : fmtARS(saldos[b.id]||0)}</div>
            {b.moneda==="USD" && dolar && <div style={{color:C.muted,fontSize:10,marginTop:2}}>{fmtARS((saldos[b.id]||0)*dolar)}</div>}
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"10px 16px 0"}}>
        <div style={Object.assign(gCard({borderRadius:18}), {padding:"14px"})}>
          <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>💲 Blue</div>
          <div style={{color:C.warn,fontSize:20,fontWeight:600}}>{dolar ? "$"+fmtNum(dolar) : "—"}</div>
          {dolarTime && <div style={{color:C.muted,fontSize:10,marginTop:3}}>{dolarTime}</div>}
        </div>
        <div style={Object.assign(gCard({borderRadius:18}), {padding:"14px"})}>
          <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>📅 Este mes</div>
          <div style={{color:ahorro>=0 ? C.teal : C.red, fontSize:20, fontWeight:600}}>{ahorro>=0?"+":""}{fmtARS(ahorro)}</div>
          <div style={{color:C.muted,fontSize:10,marginTop:2}}>{fmtARS(i30)} in · {fmtARS(g30)} out</div>
        </div>
      </div>

      <div style={Object.assign(gCard({borderRadius:20}), {margin:"10px 16px 0", padding:"16px 18px"})}>
        <div style={{color:C.dim,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>✍️ Registro rápido</div>
        <div style={{display:"flex",gap:8}}>
          <input type="text" value={nlText} onChange={e=>setNlText(e.target.value)}
            placeholder='"gasté 5000 en comida"'
            onKeyDown={e=>{ if(e.key==="Enter") handleNLSubmit(); }}
            style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid "+C.glassBorder,borderRadius:12,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"DM Sans, sans-serif"}}/>
          <button onClick={handleNLSubmit} style={{background:C.teal,border:"none",borderRadius:12,padding:"12px 16px",color:"#060A0E",fontSize:18,cursor:"pointer",fontWeight:700,flexShrink:0}}>→</button>
        </div>
        {confirmed && <div style={{color:C.teal,fontSize:13,marginTop:8,fontWeight:600}}>✓ Guardado</div>}
        {parsed && !confirmed && (
          <div style={{marginTop:10,background:"rgba(0,201,167,0.06)",borderRadius:12,padding:"12px 14px",border:"1px solid rgba(0,201,167,0.15)"}}>
            {parsed.error ? (
              <div style={{color:C.red,fontSize:13}}>No entendí. Probá: "gasté 5000 en comida del banco"</div>

              <>
                <div style={{color:C.dim,fontSize:12,marginBottom:8}}>
                  Detecté: <strong style={{color:C.text}}>{parsed.tipo==="gasto"?"Gasto":"Ingreso"}</strong>{" "}
                  <strong style={{color:C.teal}}>{fmtARS(parsed.monto)}</strong>
                  {" · "}{parsed.tipo==="gasto" ? getCatName(parsed.catId) : getFuente(parsed.fuenteId)}

                  <button onClick={()=>setParsed(null)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"none",borderRadius:10,padding:10,color:C.muted,fontSize:14,cursor:"pointer"}}>Cancelar</button>

              </>

          </div>

      {catBreak.length > 0 && (
        <div style={Object.assign(gCard({borderRadius:20}), {margin:"10px 16px 0", padding:"18px 16px"})}>

<script type="text/babel" data-presets="react">
function ManualForm({ onSave }) {
  const [tipo,       setTipo]       = useState("gasto");
  const [monto,      setMonto]      = useState("");
  const [catId,      setCatId]      = useState(null);
  const [fuenteId,   setFuenteId]   = useState(null);
  const [bolsilloId, setBolsilloId] = useState("efectivo");
  const [origenId,   setOrigenId]   = useState("banco");
  const [destinoId,  setDestinoId]  = useState("efectivo");
  const [fecha,      setFecha]      = useState(today());
  const [nota,       setNota]       = useState("");
  const [saved,      setSaved]      = useState(false);

  function reset() { setMonto(""); setCatId(null); setFuenteId(null); setNota(""); }

  function guardar() {
    const n = parseFloat(monto.replace(",","."));
    if (!n || n <= 0) return;
    const negocio = tipo==="gasto" && !!CATS.find(c => c.id===catId && c.negocio);
    const mov = {id:uid(), tipo, monto:n, fecha, nota, negocio};
    if (tipo==="gasto")    { mov.catId = catId; mov.bolsilloId = bolsilloId; }
    if (tipo==="ingreso")  { mov.fuenteId = fuenteId; mov.bolsilloId = bolsilloId; }
    if (tipo==="transfer") { mov.origenId = origenId; mov.destinoId = destinoId; }
    onSave(mov); setSaved(true); reset();
    setTimeout(() => setSaved(false), 1500);
  }

  function pill(act) {
    return {flex:1, padding:"11px 0", border:"none", borderRadius:10, cursor:"pointer", fontFamily:"DM Sans, sans-serif", fontSize:14,
      background: act ? C.teal : "transparent", color: act ? "#060A0E" : C.muted, fontWeight: act ? 700 : 500, transition:"all 0.15s"};
  }

  return (
    <div>
      <div style={Object.assign(gCard({borderRadius:14}), {display:"flex",gap:4,marginBottom:20,padding:4})}>
        {["gasto","ingreso","transfer"].map(t => (
          <button key={t} style={pill(tipo===t)} onClick={() => { setTipo(t); reset(); }}>
            {t==="gasto" ? "Gasto" : t==="ingreso" ? "Ingreso" : "Transferencia"}
          </button>
        ))}
      </div>
      <div style={Object.assign(gCard({borderRadius:20}), {padding:"20px 16px",marginBottom:16,textAlign:"center"})}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>
          {tipo==="transfer" ? "Monto" : tipo==="ingreso" ? "Ingresé" : "Gasté"}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{color:C.muted,fontSize:32,fontWeight:200,marginRight:4}}>$</span>
          <input type="number" inputMode="decimal" placeholder="0" value={monto} onChange={e=>setMonto(e.target.value)}
            style={{border:"none",outline:"none",background:"transparent",color:monto?C.text:"rgba(255,255,255,0.15)",fontSize:52,fontWeight:200,width:"100%",textAlign:"center",letterSpacing:"-0.03em",fontFamily:"DM Sans, sans-serif"}}/>
        </div>
      </div>
      {tipo==="gasto" && (
        <>
          <Lbl>Categoría</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
            {CATS.map(c => <Chip key={c.id} selected={catId===c.id} onClick={()=>setCatId(c.id)} emoji={c.emoji} label={c.nombre.split(" ")[0]}/>)}
          </div>
        </>
      )}
      {tipo==="ingreso" && (
        <>
          <Lbl>De dónde vino</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {FUENTES.map(f => <Chip key={f.id} selected={fuenteId===f.id} onClick={()=>setFuenteId(f.id)} emoji={f.emoji} label={f.nombre.split(" ")[0]}/>)}
          </div>
        </>
      )}
      {tipo==="transfer" && (
        <>
          <Lbl>De</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
            {BOLSILLOS.map(b => <Chip key={b.id} selected={origenId===b.id} onClick={()=>setOrigenId(b.id)} emoji={b.emoji} label={b.nombre.split(" ")[0]}/>)}
          </div>
          <Lbl>A</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
            {BOLSILLOS.map(b => <Chip key={b.id} selected={destinoId===b.id} onClick={()=>setDestinoId(b.id)} emoji={b.emoji} label={b.nombre.split(" ")[0]}/>)}
          </div>
        </>
      )}
      {tipo !== "transfer" && (
        <>
          <Lbl>{tipo==="gasto" ? "Sale de" : "Entra a"}</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {BOLSILLOS.map(b => <Chip key={b.id} selected={bolsilloId===b.id} onClick={()=>setBolsilloId(b.id)} emoji={b.emoji} label={b.nombre.split(" ")[0]}/>)}
          </div>
        </>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div>
          <Lbl>Fecha</Lbl>
          <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}
            style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"12px",color:C.text,fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:"DM Sans, sans-serif"})}/>
        </div>
        <div>
          <Lbl>Nota</Lbl>
          <input type="text" value={nota} onChange={e=>setNota(e.target.value)} placeholder="opcional"
            style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"12px",color:C.text,fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:"DM Sans, sans-serif"})}/>
        </div>
      </div>
      <button onClick={guardar} style={{width:"100%",padding:17,
        background: saved ? "rgba(0,201,167,0.15)" : "linear-gradient(135deg,#00C9A7,#00A88E)",
        border: saved ? "1px solid "+C.glassTealB : "none",
        borderRadius:16, color: saved ? C.teal : "#060A0E", fontSize:17, fontWeight:700, cursor:"pointer", fontFamily:"DM Sans, sans-serif"}}>
        {saved ? "✓ Guardado" : "Guardar"}
      </button>
    </div>
  );
}

function ProgramadosPanel({ programados, setProgramados }) {
  const [showForm,   setShowForm]   = useState(false);
  const [nombre,     setNombre]     = useState("");
  const [monto,      setMonto]      = useState("");
  const [fuenteId,   setFuenteId]   = useState("bar");
  const [bolsilloId, setBolsilloId] = useState("mp");
  const [dias,       setDias]       = useState([]);
  const [hora,       setHora]       = useState(23);

  function saveP(ps) { setProgramados(ps); saveJ(SK.programados, ps); }
  function toggleDia(d) { setDias(p => p.includes(d) ? p.filter(x => x!==d) : [...p, d]); }

  function addP() {
    if (!monto || dias.length === 0) return;
    saveP([...programados, {id:uid(), nombre: nombre || FUENTES.find(f=>f.id===fuenteId)?.nombre || "Ingreso", fuenteId, bolsilloId, monto: parseFloat(monto)||0, diasSemana: dias, horaActivacion: hora, activo:true}]);
    setShowForm(false); setNombre(""); setMonto(""); setDias([]); setHora(23);
  }

  return (
    <div>
      {programados.length===0 && !showForm && (
        <div style={Object.assign(gCard({borderRadius:20}), {padding:"40px 24px",textAlign:"center",marginBottom:16})}>
          <div style={{fontSize:40,marginBottom:12}}>🔄</div>
          <div style={{color:C.text,fontSize:16,fontWeight:600,marginBottom:6}}>Sin ingresos programados</div>
          <div style={{color:C.muted,fontSize:13}}>Configurá ingresos recurrentes y confirmá cada día.</div>
        </div>
      )}
      {programados.map(p => {
        const fuente = FUENTES.find(f => f.id===p.fuenteId);
        const diasLabel = p.diasSemana.map(d => DIAS.find(x => x.val===d)?.lbl).join(" · ");
        return (
          <div key={p.id} style={Object.assign(gCard({borderRadius:18}), {padding:"16px",marginBottom:12,opacity:p.activo?1:0.5})}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:24}}>{fuente && fuente.emoji}</span>
                <div>
                  <div style={{color:C.text,fontSize:15,fontWeight:700}}>{p.nombre}</div>
                  <div style={{color:C.muted,fontSize:12}}>{fmtARS(p.monto)} · {diasLabel} · {p.horaActivacion}:00hs</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>saveP(programados.map(x=>x.id===p.id?{...x,activo:!x.activo}:x))}
                  style={{background:p.activo?"rgba(0,201,167,0.1)":"rgba(255,255,255,0.04)",border:"1px solid "+(p.activo?C.glassTealB:C.glassBorder),borderRadius:8,padding:"6px 10px",color:p.activo?C.teal:C.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  {p.activo ? "ON" : "OFF"}
                </button>
                <button onClick={()=>saveP(programados.filter(x=>x.id!==p.id))}
                  style={{background:"none",border:"none",color:C.muted,fontSize:16,cursor:"pointer",padding:"6px"}}>✕</button>
              </div>
            </div>
          </div>
        );
      })}
      {showForm ? (
        <div style={Object.assign(gCard({borderRadius:22}), {padding:"20px 16px"})}>
          <div style={{color:C.dim,fontSize:14,fontWeight:700,marginBottom:16}}>Nuevo ingreso programado</div>
          <Lbl>Nombre</Lbl>
          <input type="text" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="ej: The Oldest Bar"
            style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"12px 14px",color:C.text,fontSize:14,boxSizing:"border-box",outline:"none",marginBottom:14,fontFamily:"DM Sans, sans-serif"})}/>
          <Lbl>Monto ($)</Lbl>
          <input type="number" inputMode="decimal" placeholder="50000" value={monto} onChange={e=>setMonto(e.target.value)}
            style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"12px 14px",color:C.text,fontSize:22,fontWeight:300,boxSizing:"border-box",outline:"none",marginBottom:14,fontFamily:"DM Sans, sans-serif"})}/>
          <Lbl>Fuente</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
            {FUENTES.map(f => <Chip key={f.id} selected={fuenteId===f.id} onClick={()=>setFuenteId(f.id)} emoji={f.emoji} label={f.nombre.split(" ")[0]}/>)}
          </div>
          <Lbl>Entra a</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
            {BOLSILLOS.map(b => <Chip key={b.id} selected={bolsilloId===b.id} onClick={()=>setBolsilloId(b.id)} emoji={b.emoji} label={b.nombre.split(" ")[0]}/>)}
          </div>
          <Lbl>Días</Lbl>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {DIAS.map(d => (
              <div key={d.val} onClick={()=>toggleDia(d.val)} style={{flex:1,padding:"10px 0",textAlign:"center",borderRadius:10,cursor:"pointer",
                background:dias.includes(d.val)?"rgba(0,201,167,0.12)":"rgba(255,255,255,0.03)",
                border:"1.5px solid "+(dias.includes(d.val)?C.glassTealB:C.glassBorder),
                color:dias.includes(d.val)?C.teal:C.muted, fontSize:12, fontWeight:700}}>
                {d.lbl}
              </div>
            ))}
          </div>
          <Lbl>Preguntar a partir de las</Lbl>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
            <input type="range" min={0} max={23} value={hora} onChange={e=>setHora(parseInt(e.target.value))}
              style={{flex:1, accentColor:C.teal, height:4}}/>
            <span style={{color:C.text,fontSize:18,fontWeight:600,minWidth:60,textAlign:"right"}}>{hora}:00hs</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={addP} style={{flex:1,background:"linear-gradient(135deg,#00C9A7,#00A88E)",border:"none",borderRadius:12,padding:14,color:"#060A0E",fontSize:15,fontWeight:700,cursor:"pointer"}}>Guardar</button>
            <button onClick={()=>setShowForm(false)} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"none",borderRadius:12,padding:14,color:C.muted,fontSize:14,cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      ) : (
        <button onClick={()=>setShowForm(true)} style={{width:"100%",padding:16,background:"rgba(0,201,167,0.07)",border:"1.5px dashed rgba(0,201,167,0.25)",borderRadius:18,color:C.teal,fontSize:15,fontWeight:600,cursor:"pointer"}}>
          + Nuevo ingreso programado
        </button>
      )}
    </div>
  );
}

function RegistrarTab({ onSave, programados, setProgramados }) {
  const [sub, setSub] = useState("manual");
  return (
    <div style={{padding:"16px 16px 110px"}}>
      <div style={Object.assign(gCard({borderRadius:14}), {display:"flex",gap:4,marginBottom:20,padding:4})}>
        {[["manual","✏️ Manual"],["programados","🔄 Programados"]].map(([id,lb]) => (
          <button key={id} onClick={()=>setSub(id)} style={{flex:1,padding:"11px 0",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"DM Sans, sans-serif",fontSize:14,
            background:sub===id?C.teal:"transparent",color:sub===id?"#060A0E":C.muted,fontWeight:sub===id?700:500,transition:"all 0.15s"}}>
            {lb}
          </button>
        ))}
      </div>
      {sub==="manual" && <ManualForm onSave={onSave}/>}
      {sub==="programados" && <ProgramadosPanel programados={programados} setProgramados={setProgramados}/>}
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">
function PlanesTab({ planes, setPlanes, avgAhorro }) {
  const [showForm,   setShowForm]   = useState(false);
  const [nombre,     setNombre]     = useState("");
  const [emoji,      setEmoji]      = useState("🎯");
  const [objetivo,   setObjetivo]   = useState("");
  const [modo,       setModo]       = useState("fecha");
  const [fechaObj,   setFechaObj]   = useState("");
  const [porMes,     setPorMes]     = useState("");
  const [aportId,    setAportId]    = useState(null);
  const [aportAmt,   setAportAmt]   = useState("");

  function saveP(ps) { setPlanes(ps); saveJ(SK.planes, ps); }

  function addPlan() {
    if (!nombre || !objetivo) return;
    const p = {id:uid(), nombre, emoji, objetivo:parseFloat(objetivo)||0, acumulado:0,
      modo, fechaObjetivo: modo==="fecha"?fechaObj:null, porMes: modo==="mensual"?(parseFloat(porMes)||0):null};
    saveP([...planes, p]);
    setShowForm(false); setNombre(""); setEmoji("🎯"); setObjetivo(""); setFechaObj(""); setPorMes("");
  }

  function addAporte() {
    const n = parseFloat(aportAmt);
    if (!n || !aportId) return;
    saveP(planes.map(p => p.id===aportId ? {...p, acumulado: Math.min(p.acumulado+n, p.objetivo)} : p));
    setAportId(null); setAportAmt("");
  }

  const objN    = parseFloat(objetivo) || 0;
  const porMesN = parseFloat(porMes) || 0;
  const derivedMeses = modo==="mensual" && porMesN>0 && objN>0 ? Math.ceil(objN/porMesN) : null;
  const derivedPorMes = (modo==="fecha" && fechaObj && objN>0) ? (() => {
    const m = Math.max(1, Math.ceil((new Date(fechaObj+"T12:00:00") - Date.now()) / (30*864e5)));
    return objN / m;
  })() : null;

  return (
    <div style={{padding:"16px 16px 110px"}}>
      {planes.length===0 && !showForm && (
        <div style={Object.assign(gCard({borderRadius:22}), {padding:"40px 24px",textAlign:"center",marginBottom:16})}>
          <div style={{fontSize:44,marginBottom:12}}>🎯</div>
          <div style={{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}}>¿Para qué estás ahorrando?</div>
          <div style={{color:C.muted,fontSize:14,lineHeight:1.65}}>Creá un plan y te digo exactamente cuánto guardar por mes para llegar.</div>
        </div>
      )}
      {planes.map(p => {
        const d = getPlanData(p);
        const isAp = aportId===p.id;
        const progColor = d.pct>80 ? C.teal : d.pct>40 ? C.blue : C.warn;
        return (
          <div key={p.id} style={Object.assign(gCard({borderRadius:22}), {padding:"20px 18px",marginBottom:14})}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:32}}>{p.emoji}</span>
                <div>
                  <div style={{color:C.text,fontSize:18,fontWeight:700}}>{p.nombre}</div>
                  <div style={{color:C.muted,fontSize:12,marginTop:2}}>Objetivo: {fmtARS(p.objetivo)}</div>
                </div>
              </div>
              <button onClick={()=>saveP(planes.filter(x=>x.id!==p.id))}
                style={{background:"none",border:"none",color:"rgba(255,255,255,0.15)",fontSize:14,cursor:"pointer",padding:4}}>✕</button>
            </div>
            {d.porMes && d.porMes > 0 && (
              <div style={Object.assign(gTeal({borderRadius:16}), {padding:"16px",marginBottom:16,textAlign:"center"})}>
                <div style={{color:"rgba(0,201,167,0.7)",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Guardá por mes</div>
                <div style={{color:C.text,fontSize:36,fontWeight:200,letterSpacing:"-0.03em"}}>{fmtARS(d.porMes)}</div>
                {avgAhorro > 0 && d.porMes > avgAhorro && (
                  <div style={{color:C.warn,fontSize:12,marginTop:6}}>⚠️ Tu ahorro promedio actual es {fmtARS(avgAhorro)}/mes — necesitás aumentarlo</div>
                )}
                {avgAhorro > 0 && d.porMes <= avgAhorro && (
                  <div style={{color:C.teal,fontSize:12,marginTop:6}}>✓ Alcanzable con tu ritmo actual</div>
                )}
              </div>
            )}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:C.teal,fontSize:15,fontWeight:600}}>{fmtARS(p.acumulado)}</span>
                <span style={{color:C.muted,fontSize:13}}>{d.pct.toFixed(0)}%</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.05)",borderRadius:99,height:10,overflow:"hidden",marginBottom:6}}>
                <div style={{width:d.pct+"%",height:"100%",background:"linear-gradient(90deg,"+progColor+","+progColor+"CC)",borderRadius:99,transition:"width 0.6s"}}/>
              </div>
              <div style={{color:C.muted,fontSize:12}}>
                {d.falta > 0 ? "Faltán " + fmtARS(d.falta) : "¡Meta alcanzada! 🎉"}
                {d.fechaEstimada && d.falta > 0 && <span> · llegás en <strong style={{color:C.dim}}>{fmtMesAnio(d.fechaEstimada)}</strong></span>}
              </div>
            </div>
            {isAp ? (
              <div style={{display:"flex",gap:8}}>
                <input type="number" inputMode="decimal" placeholder="¿Cuánto aportás?" value={aportAmt} onChange={e=>setAportAmt(e.target.value)}
                  style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid "+C.glassBorder,borderRadius:10,padding:"11px 12px",color:C.text,fontSize:16,outline:"none",fontFamily:"DM Sans, sans-serif"}}/>
                <button onClick={addAporte} style={{background:"linear-gradient(135deg,#00C9A7,#00A88E)",border:"none",borderRadius:10,padding:"11px 14px",color:"#060A0E",fontWeight:700,fontSize:14,cursor:"pointer"}}>+</button>
                <button onClick={()=>{setAportId(null);setAportAmt("");}} style={{background:"rgba(255,255,255,0.05)",border:"none",borderRadius:10,padding:"11px 12px",color:C.muted,fontSize:13,cursor:"pointer"}}>✕</button>
              </div>
            ) : (
              <button onClick={()=>setAportId(p.id)} style={{width:"100%",background:"rgba(0,201,167,0.08)",border:"1px solid "+C.glassTealB,borderRadius:12,padding:11,color:C.teal,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                + Aportar al plan
              </button>
            )}
          </div>
        );
      })}
      {showForm ? (
        <div style={Object.assign(gCard({borderRadius:22}), {padding:"20px 18px"})}>
          <div style={{color:C.dim,fontSize:15,fontWeight:700,marginBottom:18}}>Nuevo plan de ahorro</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
            {PLAN_EMOJIS.map(e => (
              <div key={e} onClick={()=>setEmoji(e)} style={{width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:12,fontSize:22,cursor:"pointer",
                background:emoji===e?"rgba(0,201,167,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(emoji===e?C.glassTealB:C.glassBorder)}}>
                {e}
              </div>
            ))}
          </div>
          <Lbl>¿Para qué estás ahorrando?</Lbl>
          <input type="text" placeholder="ej: Viaje a Europa, Moto, Mudanza" value={nombre} onChange={e=>setNombre(e.target.value)}
            style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"13px 14px",color:C.text,fontSize:15,boxSizing:"border-box",outline:"none",marginBottom:14,fontFamily:"DM Sans, sans-serif"})}/>
          <Lbl>¿Cuánto necesitás en total?</Lbl>
          <div style={Object.assign(gCard({borderRadius:12}), {display:"flex",alignItems:"center",padding:"0 14px",marginBottom:14})}>
            <span style={{color:C.muted,fontSize:24,fontWeight:200}}>$</span>
            <input type="number" inputMode="decimal" placeholder="0" value={objetivo} onChange={e=>setObjetivo(e.target.value)}
              style={{border:"none",outline:"none",background:"transparent",color:C.text,fontSize:24,fontWeight:300,width:"100%",padding:"14px 8px",fontFamily:"DM Sans, sans-serif"}}/>
          </div>
          <Lbl>¿Cómo querés planificarlo?</Lbl>
          <div style={Object.assign(gCard({borderRadius:12}), {display:"flex",gap:4,padding:4,marginBottom:14})}>
            {[["fecha","📅 Tengo una fecha"],["mensual","💰 Puedo guardar $X/mes"]].map(([id,lb]) => (
              <button key={id} onClick={()=>setModo(id)} style={{flex:1,padding:"10px 6px",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"DM Sans, sans-serif",fontSize:12,
                background:modo===id?C.teal:"transparent",color:modo===id?"#060A0E":C.muted,fontWeight:modo===id?700:500}}>
                {lb}
              </button>
            ))}
          </div>
          {modo==="fecha" && (
            <>
              <Lbl>¿Cuándo querés tenerlo?</Lbl>
              <input type="date" value={fechaObj} onChange={e=>setFechaObj(e.target.value)}
                style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"13px 14px",color:C.text,fontSize:15,boxSizing:"border-box",outline:"none",marginBottom:14,fontFamily:"DM Sans, sans-serif"})}/>
              {derivedPorMes && objN>0 && fechaObj && (
                <div style={Object.assign(gTeal({borderRadius:12}), {padding:"12px 14px",marginBottom:14})}>
                  <div style={{color:"rgba(0,201,167,0.7)",fontSize:11,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Vas a necesitar guardar</div>
                  <div style={{color:C.text,fontSize:28,fontWeight:300}}>{fmtARS(derivedPorMes)} <span style={{fontSize:14,color:C.muted}}>/ mes</span></div>
                </div>
              )}
            </>
          )}
          {modo==="mensual" && (
            <>
              <Lbl>¿Cuánto podés guardar por mes?</Lbl>
              <div style={Object.assign(gCard({borderRadius:12}), {display:"flex",alignItems:"center",padding:"0 14px",marginBottom:14})}>
                <span style={{color:C.muted,fontSize:24,fontWeight:200}}>$</span>
                <input type="number" inputMode="decimal" placeholder="0" value={porMes} onChange={e=>setPorMes(e.target.value)}
                  style={{border:"none",outline:"none",background:"transparent",color:C.text,fontSize:24,fontWeight:300,width:"100%",padding:"14px 8px",fontFamily:"DM Sans, sans-serif"}}/>
              </div>
              {derivedMeses && objN>0 && porMesN>0 && (
                <div style={Object.assign(gTeal({borderRadius:12}), {padding:"12px 14px",marginBottom:14})}>
                  <div style={{color:"rgba(0,201,167,0.7)",fontSize:11,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Llegás en</div>
                  <div style={{color:C.text,fontSize:28,fontWeight:300}}>{derivedMeses<12 ? derivedMeses+" meses" : (derivedMeses/12).toFixed(1)+" años"}</div>
                  <div style={{color:"rgba(0,201,167,0.6)",fontSize:12,marginTop:4}}>{fmtMesAnio(new Date(Date.now()+derivedMeses*30*864e5))}</div>
                </div>
              )}
            </>
          )}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={addPlan} style={{flex:1,background:"linear-gradient(135deg,#00C9A7,#00A88E)",border:"none",borderRadius:14,padding:15,color:"#060A0E",fontSize:16,fontWeight:700,cursor:"pointer"}}>Crear plan</button>
            <button onClick={()=>setShowForm(false)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"none",borderRadius:14,padding:15,color:C.muted,fontSize:15,cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      ) : (
        <button onClick={()=>setShowForm(true)} style={{width:"100%",padding:16,background:"rgba(0,201,167,0.07)",border:"1.5px dashed rgba(0,201,167,0.25)",borderRadius:18,color:C.teal,fontSize:15,fontWeight:600,cursor:"pointer"}}>
          + Nuevo plan
        </button>
      )}
    </div>
  );
}

<script type="text/babel" data-presets="react">
function HistorialTab({ movs, onDelete }) {
  const sorted = [...(movs||[])].sort((a,b) => b.fecha.localeCompare(a.fecha));
  const groups = {};
  sorted.forEach(m => { if (!groups[m.fecha]) groups[m.fecha]=[]; groups[m.fecha].push(m); });
  if (!movs || movs.length===0) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"50vh",color:C.muted}}>
      <div style={{fontSize:40,marginBottom:12}}>📋</div>
      <div style={{fontSize:15,fontWeight:600,color:C.text}}>Sin movimientos todavía</div>
      <div style={{fontSize:13,marginTop:4}}>Registrá tu primer gasto o ingreso.</div>
    </div>
  );
  return (
    <div style={{padding:"16px 16px 110px"}}>
      {Object.entries(groups).map(([fecha, items]) => (
        <div key={fecha} style={{marginBottom:20}}>
          <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>{fmtFecha(fecha)}</div>
          {items.map(m => (
            <div key={m.id} style={Object.assign(gCard({borderRadius:16}), {padding:"13px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"})}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:C.text,fontSize:14,fontWeight:600,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {m.tipo==="gasto" ? getCatName(m.catId) : m.tipo==="ingreso" ? getFuente(m.fuenteId) : (getBolsillo(m.origenId)+" → "+getBolsillo(m.destinoId))}
                  {m.programado && <span style={{color:C.teal,fontSize:10,marginLeft:6}}>🔄</span>}
                </div>
                <div style={{color:C.muted,fontSize:12}}>
                  {m.tipo==="transfer" ? "Transferencia" : getBolsillo(m.bolsilloId)}
                  {m.nota ? " · "+m.nota : ""}
                  {m.negocio && <span style={{color:C.teal,marginLeft:4}}>· contenido</span>}
                </div>
              </div>
              <div style={{textAlign:"right",marginLeft:12,flexShrink:0}}>
                <div style={{color: m.tipo==="ingreso"?C.teal:m.tipo==="transfer"?C.muted:C.red, fontSize:15, fontWeight:700}}>
                  {m.tipo==="ingreso"?"+":m.tipo==="gasto"?"-":""}{fmtARS(m.monto)}
                </div>
                <button onClick={()=>onDelete(m.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.12)",fontSize:11,cursor:"pointer",padding:"2px 0"}}>eliminar</button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}
