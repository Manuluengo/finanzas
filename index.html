// ASESOR TAB
// ════════════════════════════════════════════════════════════════════════════
function ProyeccionChart({ total, avgAhorro }) {
  if (!avgAhorro || avgAhorro <= 0 || !total) return null;
  const months=12, W=300, H=90, PT=14, PB=18;
  const pts = Array.from({length:months+1}, (_,i) => total + avgAhorro*i);
  const maxV=pts[months], minV=total;
  const x = i => (i/months)*W;
  const y = v => H - PB - ((v-minV)/(maxV-minV||1)) * (H-PT-PB);
  const pathD = pts.map((v,i) => (i===0?"M":"L")+x(i).toFixed(1)+","+y(v).toFixed(1)).join(" ");
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",overflow:"visible"}}>
      <defs>
        <linearGradient id="pgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00C9A7" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#00C9A7" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={pathD+" L"+x(months)+","+(H-PB)+" L"+x(0)+","+(H-PB)+" Z"} fill="url(#pgrd)"/>
      <path d={pathD} fill="none" stroke="#00C9A7" strokeWidth="2" strokeLinecap="round"/>
      <circle cx={x(0)} cy={y(total)} r="4" fill="#00C9A7"/>
      <circle cx={x(months)} cy={y(pts[months])} r="4" fill="#00C9A7"/>
      {[0,3,6,9,12].map(i => (
        <g key={i}>
          <line x1={x(i)} y1={H-PB} x2={x(i)} y2={H-PB+4} stroke="rgba(255,255,255,0.12)" strokeWidth="1"/>
          <text x={x(i)} y={H-2} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="8">{i===0?"Hoy":i+"m"}</text>
        </g>
      ))}
    </svg>
  );
}

function TipCard({ emoji, titulo, contenido }) {
  const [open, setOpen] = useState(false);
  return (
    <div onClick={()=>setOpen(!open)} style={Object.assign(gCard({borderRadius:14}), {padding:"13px 16px",marginBottom:8,cursor:"pointer"})}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:20}}>{emoji}</span>
          <span style={{color:C.text,fontSize:13,fontWeight:600}}>{titulo}</span>
        </div>
        <span style={{color:C.muted,fontSize:12}}>{open?"▲":"▼"}</span>
      </div>
      {open && <div style={{color:C.dim,fontSize:13,lineHeight:1.7,marginTop:10,paddingTop:10,borderTop:"1px solid "+C.glassBorder}}>{contenido}</div>}
    </div>
  );
}

function AsesorTab({ saldos, movs, dolar, planes }) {
  const total   = calcTotal(saldos, dolar);
  const c3m     = new Date(Date.now()-90*864e5).toISOString().slice(0,10);
  const m3m     = movs.filter(m => m.fecha >= c3m);
  const g3m     = m3m.filter(m => m.tipo==="gasto").reduce((s,m) => s+m.monto, 0);
  const i3m     = m3m.filter(m => m.tipo==="ingreso").reduce((s,m) => s+m.monto, 0);
  const fechas  = m3m.map(m => m.fecha).sort();
  const div     = Math.min(3, Math.max(1, fechas.length>0 ? Math.ceil((Date.now()-new Date(fechas[0]+"T12:00:00"))/(30*864e5)) : 1));
  const avgGasto   = g3m/div;
  const avgAhorro  = (i3m-g3m)/div;
  const tasaAhorro = i3m > 0 ? (i3m-g3m)/i3m*100 : 0;
  const runway     = avgGasto > 0 ? total/avgGasto : 0;
  const sc    = calcScore(tasaAhorro, runway, saldos, dolar, movs);
  const scc   = scoreColor(sc.total);
  const insights  = buildInsights(saldos, movs, dolar, avgGasto, avgAhorro, tasaAhorro, runway, i3m);
  const tipColor  = {danger:C.red, warn:C.warn, ok:C.teal, info:C.blue};
  const pace        = getSpendingPace(movs);
  const wasteAlerts  = getWasteAlerts(movs);
  const now       = new Date();
  const monthStart = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-01";
  const gMes  = movs.filter(m => m.tipo==="gasto"   && m.fecha >= monthStart).reduce((s,m) => s+m.monto, 0);
  const iMes  = movs.filter(m => m.tipo==="ingreso" && m.fecha >= monthStart).reduce((s,m) => s+m.monto, 0);
  const extra = iMes - gMes;
  const sugs  = [];
  if (extra > 0) {
    if (runway < 3) sugs.push({emoji:"🛡️", titulo:"Reforzá tu reserva", txt:"Todavía no tenés 3 meses de reserva. Estos "+fmtARS(extra)+" guardados en el banco te acercan a ese objetivo."});
    const pl = planes.find(p => p.objetivo > p.acumulado);
    if (pl && runway >= 2) sugs.push({emoji:pl.emoji, titulo:"Sumá a \""+pl.nombre+"\"", txt:"Podés aportar "+fmtARS(extra)+" a tu plan y acercarte al objetivo."});
    if (dolar && total > 0 && (saldos.dolares||0)*dolar/total < 0.1 && runway >= 3)
      sugs.push({emoji:"💲", titulo:"Comprá dólares", txt:"Con "+fmtARS(extra)+" podés comprar aprox. "+fmtUSD(extra/dolar)+" al blue. Protege tu plata de la inflación."});
    if (sugs.length === 0) sugs.push({emoji:"📈", titulo:"Tu reserva ya está sólida", txt:"Con "+runway.toFixed(1)+" meses de reserva estás muy bien. Este extra podría ir a un plazo fijo o FCI para que rinda un poco."});
  }
  const scoreData = [
    {lbl:"¿Cuánto guardás de lo que ganás?",    val:sc.s1, desc:i3m>0?"$"+tasaAhorro.toFixed(0)+" de cada $100":"sin datos"},
    {lbl:"¿Cuánto aguantás sin trabajar?",       val:sc.s2, desc:avgGasto>0?runway.toFixed(1)+" meses":"sin datos"},
    {lbl:"¿Tenés algo en dólares?",              val:sc.s3, desc:(saldos.dolares||0)>0?"USD "+fmtNum(saldos.dolares||0):"nada todavía"},
    {lbl:"¿De cuántos lados te entra plata?",    val:sc.s4, desc:"fuentes de ingreso"},
  ];
  return (
    <div style={{paddingBottom:110}}>
      <div style={Object.assign(gCard({borderRadius:24}), {margin:"0 16px", padding:"22px 20px"})}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Tu situación financiera</div>
            <div style={{color:scc,fontSize:52,fontWeight:200,letterSpacing:"-0.04em",lineHeight:1}}>{sc.total}</div>
            <div style={{color:scc,fontSize:14,fontWeight:600,marginTop:6}}>{scoreLabel(sc.total)}</div>
          </div>
          <div style={{fontSize:52}}>{sc.total<30?"🌱":sc.total<50?"🔨":sc.total<70?"📈":sc.total<85?"💪":"🏆"}</div>
        </div>
        {scoreData.map(c => (
          <div key={c.lbl} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{color:C.dim,fontSize:12}}>{c.lbl}</span>
              <span style={{color:c.val/25>0.6?C.teal:c.val/25>0.3?C.warn:C.red, fontSize:12, fontWeight:700}}>{c.val}/25</span>
            </div>
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:99,height:5,overflow:"hidden"}}>
              <div style={{width:(c.val/25*100)+"%",height:"100%",background:c.val/25>0.6?C.teal:c.val/25>0.3?C.warn:C.red,borderRadius:99,transition:"width 0.6s"}}/>
            </div>
            <div style={{color:C.muted,fontSize:11,marginTop:3}}>{c.desc}</div>
          </div>
        ))}
      </div>
      {pace && (
        <div style={Object.assign(gCard({borderRadius:18, borderLeft:"3px solid "+(pace.ratio>1.2?C.red:pace.ratio<0.75?C.teal:C.warn)}), {margin:"12px 16px 0",padding:"14px 16px"})}>
          <div style={{color:C.text,fontSize:14,fontWeight:700,marginBottom:5}}>
            {pace.ratio>1.2?"🔴 Vas gastando más de lo normal":pace.ratio<0.75?"🟢 Mes más liviano que de costumbre":"🟡 Ritmo de gasto normal"}
          </div>
          <div style={{color:C.dim,fontSize:13,lineHeight:1.6}}>
            {pace.ratio>1.2
              ?"Van "+pace.dom+" días y ya gastaste "+fmtARS(pace.gastoMes)+". Si seguís así, cerrarías el mes en "+fmtARS(pace.proyectado)+" — un "+((pace.ratio-1)*100).toFixed(0)+"% más que el mes pasado."
              :pace.ratio<0.75
                ?"Van "+pace.dom+" días y gastaste "+fmtARS(pace.gastoMes)+" — bastante menos que de costumbre. Este mes te va a sobrar plata extra."
                :"Van "+pace.dom+" días del mes. Gastaste "+fmtARS(pace.gastoMes)+" — en línea con tu promedio."}
          </div>
        </div>
      )}
      {insights.length > 0 && (
        <div style={{margin:"12px 16px 0"}}>
          <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Lo que veo en tus números</div>
          {insights.map((t,i) => (
            <div key={i} style={Object.assign(gCard({borderRadius:18, borderLeft:"3px solid "+(tipColor[t.tipo]||C.blue)}), {padding:"16px",marginBottom:10})}>
              <div style={{color:C.text,fontSize:14,fontWeight:700,marginBottom:5}}>{t.titulo}</div>
              <div style={{color:C.dim,fontSize:13,lineHeight:1.65}}>{t.txt}</div>
            </div>
          ))}
        </div>
      )}
      {wasteAlerts && wasteAlerts.length > 0 && (
        <div style={{margin:"12px 16px 0"}}>
          <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>🚨 Gastos que podés reducir</div>
          {wasteAlerts.map((a,i) => (
            <div key={i} style={Object.assign(gCard({borderRadius:18,borderLeft:"3px solid "+C.red}), {padding:"16px",marginBottom:10})}>
              <div style={{color:C.text,fontSize:15,fontWeight:700,marginBottom:6}}>{a.emoji} Mucho gasto en {a.label}</div>
              <div style={{color:C.dim,fontSize:13,lineHeight:1.7}}>
                {a.count >= 2 && <div>{"· "+a.count+" veces este mes · "+fmtARS(a.total)}</div>}
                {a.pct && parseInt(a.pct)>0 && <div>{"· "+a.pct+"% más que el mes pasado"}</div>}
                {a.exceso && a.exceso>0 && <div>{"· Exceso: "+fmtARS(a.exceso)+" de más"}</div>}
                <div style={{color:C.warn,marginTop:4}}>{"· A este ritmo: "+fmtARS(a.annual)+" al año en esto."}</div>
                {a.exceso && a.exceso>0 && <div style={{color:C.teal,marginTop:2}}>{"· Bajando al nivel anterior ahorrarías "+fmtARS(a.exceso*12)+" al año."}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {extra > 0 && sugs.length > 0 && (
        <div style={{margin:"12px 16px 0"}}>
          <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>{"💸 Este mes te sobró "+fmtARS(extra)}</div>
          {sugs.map((s,i) => (
            <div key={i} style={Object.assign(gCard({borderRadius:16}), {padding:"14px 16px",marginBottom:8})}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:22,flexShrink:0}}>{s.emoji}</span>
                <div>
                  <div style={{color:C.text,fontSize:14,fontWeight:700,marginBottom:4}}>{s.titulo}</div>
                  <div style={{color:C.dim,fontSize:13,lineHeight:1.6}}>{s.txt}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {avgAhorro > 0 && (
        <div style={Object.assign(gCard({borderRadius:22}), {margin:"12px 16px 0",padding:"18px 16px"})}>
          <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>📈 Tu patrimonio en 12 meses</div>
          <div style={{color:C.dim,fontSize:13,marginBottom:16}}>Si seguís al mismo ritmo que ahora.</div>
          <ProyeccionChart total={total} avgAhorro={avgAhorro}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
            <div>
              <div style={{color:C.muted,fontSize:10,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>Hoy</div>
              <div style={{color:C.text,fontSize:15,fontWeight:600}}>{fmtARS(total)}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:C.muted,fontSize:10,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>En 12 meses</div>
              <div style={{color:C.teal,fontSize:15,fontWeight:600}}>{fmtARS(total+avgAhorro*12)}</div>
            </div>
          </div>
        </div>
      )}
      <div style={{margin:"12px 16px 0"}}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>📚 Aprendé mientras ahorrás</div>
        <TipCard emoji="🛡️" titulo="¿Qué es la reserva de emergencia?" contenido="Es plata que guardás solo para imprevistos grandes — quedarte sin trabajo, una enfermedad, un gasto enorme. No la tocás para nada más. Lo ideal: entre 3 y 6 meses de tus gastos habituales guardados en un lugar seguro y fácil de acceder."/>
        <TipCard emoji="💲" titulo="¿Por qué tener algo en dólares?" contenido="Los pesos pierden valor todos los años por la inflación. El dólar también pierde valor, pero mucho más lento. Tener el 10-15% de tu plata en dólares es como un seguro: si el peso cae mucho, al menos esa parte se mantiene."/>
        <TipCard emoji="📈" titulo="¿Qué es un FCI?" contenido="Un Fondo Común de Inversión es como una alcancía que rinde sola. Mercado Pago tiene uno — metés plata y crece un poquito todos los días, está disponible siempre. Ideal para la plata que no vas a gastar pronto pero no querés dejar quieta."/>
        <TipCard emoji="💰" titulo="¿Cuánto debería ahorrar?" contenido="Una guía clásica: 50% para lo necesario, 30% para lo que querés, y 20% para ahorro. Si llegás al 20% o más, estás muy bien. Si ahorrás algo positivo aunque sea, ya estás adelante de mucha gente."/>
        <TipCard emoji="🎯" titulo="¿Cómo funciona un plan de ahorro?" contenido="Decidís para qué querés ahorrar, cuánto necesitás y cuándo querés tenerlo. La app te dice cuánto guardar por mes. Una vez que sabés el número exacto, es mucho más fácil actuar."/>
      </div>
    </div>
  );
}


</script>
<script type="text/babel" data-presets="react">
function CoachTab({ saldos, movs, dolar, planes }) {
  const [apiKey,   setApiKey]   = useState(() => loadJ(SK.apikey, null));
  const [keyInput, setKeyInput] = useState("");
  const [messages, setMessages] = useState(() => loadJ(SK.chat, []));
  const [input,    setInput]    = useState("");
  const [loading,  setLoading]  = useState(false);
  const [keyError, setKeyError] = useState("");
  const bottomRef = useRef(null);

  useEffect(() => { if (bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"}); }, [messages]);

  const SUGS = [
    "¿Estoy bien con lo que tengo guardado?",
    "¿Cuánto debería guardar por mes?",
    "¿Qué hago con la plata que me sobra?",
    "¿Cómo llego antes a mi meta?",
    "¿Vale la pena comprar dólares ahora?",
    "¿Cómo empiezo a ordenar mis finanzas?",
  ];

  function saveKey() {
    const k = keyInput.trim();
    if (!k.startsWith("sk-ant-")) { setKeyError("La key de Anthropic empieza con 'sk-ant-'. Revisá que copiaste bien."); return; }
    setApiKey(k); saveJ(SK.apikey, k); setKeyError("");
  }

  async function send(texto) {
    const txt = (texto || input).trim();
    if (!txt || loading) return;
    setInput("");
    const userMsg = {role:"user", content:txt};
    const next = [...messages, userMsg];
    setMessages(next); saveJ(SK.chat, next);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-ipc":"true",
        },
        body:JSON.stringify({
          model:"claude-haiku-4-5",
          max_tokens:1024,
          system:buildFinancialContext(saldos,movs,dolar,planes),
          messages:next,
        }),
      });
      const data = await res.json();
      let reply;
      if (data.content && data.content[0] && data.content[0].text) {
        reply = data.content[0].text;
      } else if (data.error) {
        reply = "❌ Error: "+data.error.message+(data.error.type==="authentication_error"?" — revisá tu API key en ⚙️":"");
      } else {
        reply = "❌ Respuesta inesperada. Intentá de nuevo.";
      }
      const final = [...next, {role:"assistant", content:reply}];
      setMessages(final); saveJ(SK.chat, final);
    } catch(e) {
      const final = [...next, {role:"assistant", content:"❌ No pude conectarme. Revisá tu conexión e intentá de nuevo."}];
      setMessages(final); saveJ(SK.chat, final);
    }
    setLoading(false);
  }

  if (!apiKey) {
    return (
      <div style={{padding:"16px 16px 110px"}}>
        <div style={Object.assign(gCard({borderRadius:22}), {padding:"24px 20px",marginBottom:16})}>
          <div style={{fontSize:40,marginBottom:14,textAlign:"center"}}>🤖</div>
          <div style={{color:C.text,fontSize:18,fontWeight:700,marginBottom:10,textAlign:"center"}}>Coach financiero con IA</div>
          <div style={{color:C.dim,fontSize:14,lineHeight:1.7,marginBottom:20}}>
            Preguntale cualquier cosa sobre tu plata — qué hacer con lo que te sobra, cómo llegar antes a tu meta, si estás bien o mal. Responde con tus números reales.
          </div>
          <div style={Object.assign(gTeal({borderRadius:14}), {padding:"14px 16px",marginBottom:20})}>
            <div style={{color:C.teal,fontSize:12,fontWeight:700,marginBottom:6}}>Necesitás una API key de Anthropic</div>
            <div style={{color:C.dim,fontSize:12,lineHeight:1.65}}>Es gratis para empezar — Anthropic te da créditos. Usar el coach cuesta muy poco (fracciones de centavo por pregunta).</div>
          </div>
          <div style={{color:C.text,fontSize:13,fontWeight:700,marginBottom:12}}>Cómo conseguirla (2 min):</div>
          {["Entrá a console.anthropic.com","Creá una cuenta gratuita","Andá a API Keys → Create Key","Copiá la key y pegala acá abajo"].map((s,i) => (
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:C.glassTeal,border:"1px solid "+C.glassTealB,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:C.teal,fontSize:11,fontWeight:700}}>{i+1}</span>
              </div>
              <span style={{color:C.dim,fontSize:13,lineHeight:1.5,paddingTop:2}}>{s}</span>
            </div>
          ))}
          <div style={{marginTop:20}}>
            <input type="text" value={keyInput} onChange={e=>setKeyInput(e.target.value)} placeholder="sk-ant-api03-..."
              style={Object.assign(gCard({borderRadius:12}), {width:"100%",padding:"14px",color:C.text,fontSize:14,boxSizing:"border-box",outline:"none",marginBottom:"10px",fontFamily:"DM Sans, sans-serif"})}/>
            {keyError && <div style={{color:C.red,fontSize:12,marginBottom:10}}>{keyError}</div>}
            <button onClick={saveKey} style={{width:"100%",padding:15,background:"linear-gradient(135deg,#00C9A7,#00A88E)",border:"none",borderRadius:14,color:"#060A0E",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              Activar coach →
            </button>
          </div>
          <div style={{color:C.muted,fontSize:11,marginTop:12,textAlign:"center"}}>La key se guarda solo en este dispositivo.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
      <div style={{padding:"0 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{color:C.dim,fontSize:12}}>Usa tus datos reales</div>
        <div style={{display:"flex",gap:12}}>
          <button onClick={()=>{setMessages([]);saveJ(SK.chat,[]);}} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer"}}>limpiar</button>
          <button onClick={()=>{setApiKey(null);saveJ(SK.apikey,null);}} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer"}}>⚙️ cambiar key</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 12px"}}>
        {messages.length === 0 && (
          <div>
            <div style={Object.assign(gCard({borderRadius:18}), {padding:"20px",marginBottom:16,textAlign:"center"})}>
              <div style={{fontSize:36,marginBottom:10}}>🤖</div>
              <div style={{color:C.text,fontSize:15,fontWeight:600,marginBottom:6}}>Hola, soy tu coach financiero</div>
              <div style={{color:C.dim,fontSize:13,lineHeight:1.6}}>Preguntame lo que quieras sobre tu plata. Tengo acceso a todos tus datos.</div>
            </div>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Por dónde empezar</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
              {SUGS.map((s,i) => (
                <button key={i} onClick={()=>send(s)} style={{background:C.glass,border:"1px solid "+C.glassBorder,borderRadius:20,padding:"8px 14px",color:C.dim,fontSize:12,cursor:"pointer",fontFamily:"DM Sans, sans-serif"}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((m,i) => (
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:12}}>
            <div style={{
              maxWidth:"85%", padding:"12px 16px",
              borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
              background:m.role==="user"?"linear-gradient(135deg,#00C9A7,#00A88E)":C.glass,
              border:m.role==="user"?"none":"1px solid "+C.glassBorder,
              color:m.role==="user"?"#060A0E":C.text,
              fontSize:14, lineHeight:1.65,
            }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",justifyContent:"flex-start",marginBottom:12}}>
            <div style={Object.assign(gCard({borderRadius:"18px 18px 18px 4px"}), {padding:"14px 18px",display:"flex",gap:5})}>
              {[0,1,2].map(i => <div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.teal,opacity:0.7+i*0.1}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"8px 16px",paddingBottom:"max(env(safe-area-inset-bottom,0px),16px)",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Preguntame lo que quieras..."
            rows={1}
            style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid "+C.glassBorder,borderRadius:16,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"DM Sans, sans-serif",resize:"none",lineHeight:1.4,maxHeight:100,overflowY:"auto"}}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()}
            style={{width:44,height:44,background:input.trim()?"linear-gradient(135deg,#00C9A7,#00A88E)":"rgba(255,255,255,0.05)",border:"none",borderRadius:14,color:input.trim()?"#060A0E":C.muted,fontSize:20,cursor:input.trim()?"pointer":"default",flexShrink:0,transition:"all 0.2s"}}>
            ↑
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [saldos,      setSaldos]      = useState(() => loadJ(SK.saldos, null));
  const [movs,        setMovs]        = useState(() => loadJ(SK.movs, []));
  const [planes,      setPlanes]      = useState(() => loadJ(SK.planes, []));
  const [programados, setProgramados] = useState(() => loadJ(SK.programados, []));
  const [confirmados, setConfirmados] = useState(() => {
    const raw = loadJ(SK.confirmados, {});
    const cutoff = new Date(Date.now()-60*864e5).toISOString().slice(0,10);
    const clean = {};
    Object.entries(raw).forEach(([k,v]) => { const d=k.split("|")[1]; if(d&&d>=cutoff) clean[k]=v; });
    return clean;
  });
  const [tab,        setTab]        = useState("inicio");
  const [dolar,      setDolar]      = useState(null);
  const [dolarTime,  setDolarTime]  = useState(null);
  const [pullY,      setPullY]      = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const [pendientes, setPendientes] = useState([]);
  const touchStartY = useRef(0);
  const isTouching  = useRef(false);

  const fetchDolar = useCallback(cb => {
    fetch("https://dolarapi.com/v1/dolares/blue")
      .then(r=>r.json())
      .then(d=>{if(d?.venta){setDolar(d.venta);setDolarTime(new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}));}cb&&cb();})
      .catch(()=>{cb&&cb();});
  },[]);

  useEffect(()=>{fetchDolar();},[fetchDolar]);
  useEffect(()=>{setPendientes(getPendientes(programados,confirmados));},[programados,confirmados,tab]);

  const handleTouchStart = useCallback(e=>{if(window.scrollY===0){touchStartY.current=e.touches[0].clientY;isTouching.current=true;}},[]);
  const handleTouchMove  = useCallback(e=>{if(!isTouching.current)return;const d=e.touches[0].clientY-touchStartY.current;if(d>0&&window.scrollY===0)setPullY(Math.min(d*0.35,70));else setPullY(0);},[]);
  const handleTouchEnd   = useCallback(()=>{if(!isTouching.current)return;isTouching.current=false;if(pullY>55){setRefreshing(true);setPullY(0);fetchDolar(()=>setRefreshing(false));}else setPullY(0);touchStartY.current=0;},[pullY,fetchDolar]);

  const handleSave = useCallback(mov=>{
    setSaldos(prev=>{const ns={...prev};if(mov.tipo==="gasto")ns[mov.bolsilloId]=(ns[mov.bolsilloId]||0)-mov.monto;if(mov.tipo==="ingreso")ns[mov.bolsilloId]=(ns[mov.bolsilloId]||0)+mov.monto;if(mov.tipo==="transfer"){ns[mov.origenId]=(ns[mov.origenId]||0)-mov.monto;ns[mov.destinoId]=(ns[mov.destinoId]||0)+mov.monto;}saveJ(SK.saldos,ns);return ns;});
    setMovs(prev=>{const nm=[mov,...prev];saveJ(SK.movs,nm);return nm;});
    if(mov.tipo!=="transfer")setTab("inicio");
  },[]);

  const handleDelete = useCallback(id=>{
    setMovs(prev=>{const mov=prev.find(m=>m.id===id);if(!mov)return prev;setSaldos(s=>{const ns={...s};if(mov.tipo==="gasto")ns[mov.bolsilloId]=(ns[mov.bolsilloId]||0)+mov.monto;if(mov.tipo==="ingreso")ns[mov.bolsilloId]=(ns[mov.bolsilloId]||0)-mov.monto;if(mov.tipo==="transfer"){ns[mov.origenId]=(ns[mov.origenId]||0)+mov.monto;ns[mov.destinoId]=(ns[mov.destinoId]||0)-mov.monto;}saveJ(SK.saldos,ns);return ns;});const nm=prev.filter(m=>m.id!==id);saveJ(SK.movs,nm);return nm;});
  },[]);

  const handleConfirmar=(p,m)=>{handleSave({id:uid(),tipo:"ingreso",monto:m,fecha:today(),nota:p.nombre,negocio:false,fuenteId:p.fuenteId,bolsilloId:p.bolsilloId,programado:true});const nc={...confirmados,[p.id+"|"+today()]:"confirmado"};setConfirmados(nc);saveJ(SK.confirmados,nc);setPendientes(x=>x.filter(y=>y.id!==p.id));};
  const handleSaltar=p=>{const nc={...confirmados,[p.id+"|"+today()]:"saltado"};setConfirmados(nc);saveJ(SK.confirmados,nc);setPendientes(x=>x.filter(y=>y.id!==p.id));};

  const c3m_=new Date(Date.now()-90*864e5).toISOString().slice(0,10);
  const m3m_=(movs||[]).filter(m=>m.fecha>=c3m_);
  const g3m_=m3m_.filter(m=>m.tipo==="gasto").reduce((s,m)=>s+m.monto,0);
  const i3m_=m3m_.filter(m=>m.tipo==="ingreso").reduce((s,m)=>s+m.monto,0);
  const fechas_=m3m_.map(m=>m.fecha).sort();
  const div_=Math.min(3,Math.max(1,fechas_.length>0?Math.ceil((Date.now()-new Date(fechas_[0]+"T12:00:00"))/(30*864e5)):1));
  const avgAhorro_=(i3m_-g3m_)/div_;

  if (!saldos) return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"DM Sans, sans-serif"}}>
      <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse 80% 50% at 15% 0%,rgba(0,201,167,0.14) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 90%,rgba(107,140,255,0.1) 0%,transparent 60%),#060A0E",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1}}><SetupScreen onDone={s=>setSaldos(s)}/></div>
    </div>
  );

  const NAV=[{id:"inicio",emoji:"🏠",label:"INICIO"},{id:"registrar",emoji:"✏️",label:"NUEVO"},{id:"planes",emoji:"🎯",label:"PLANES"},{id:"asesor",emoji:"💡",label:"ASESOR"},{id:"coach",emoji:"🤖",label:"COACH"}];
  const titles={inicio:"Finanzas",registrar:"Registrar ✏️",planes:"Planes 🎯",asesor:"Asesor 💡",coach:"Coach IA 🤖"};

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"DM Sans, sans-serif",maxWidth:430,margin:"0 auto",position:"relative"}}
      onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
      <div style={{position:"fixed",inset:0,maxWidth:430,margin:"0 auto",background:"radial-gradient(ellipse 90% 50% at 10% 0%,rgba(0,201,167,0.13) 0%,transparent 55%),radial-gradient(ellipse 60% 40% at 90% 85%,rgba(107,140,255,0.09) 0%,transparent 55%),#060A0E",zIndex:0}}/>
      {(pullY>10||refreshing)&&<div style={{position:"fixed",top:Math.max(pullY-30,8),left:"50%",transform:"translateX(-50%)",zIndex:50,width:34,height:34,borderRadius:"50%",...gTeal({borderRadius:"50%"}),display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:16,height:16,border:"2px solid "+C.teal,borderTopColor:"transparent",borderRadius:"50%",animation:refreshing?"spin 0.7s linear infinite":undefined,transform:refreshing?undefined:"rotate("+(pullY*3)+"deg)"}}/></div>}
      <div style={{position:"relative",zIndex:1,transform:"translateY("+Math.min(pullY,60)+"px)",transition:pullY===0?"transform 0.3s":"none"}}>
        <div style={{padding:"54px 20px 10px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <h1 style={{color:tab==="inicio"?C.muted:C.text,fontSize:tab==="inicio"?15:22,fontWeight:tab==="inicio"?400:700,margin:0}}>{titles[tab]||"Finanzas"}</h1>
          {tab==="inicio"&&dolar&&<div style={Object.assign(gCard({borderRadius:10}),{padding:"6px 12px",color:C.warn,fontSize:13,fontWeight:600})}>Blue ${fmtNum(dolar)}</div>}
        </div>
        {tab==="inicio"    &&<InicioTab saldos={saldos} movs={movs} dolar={dolar} dolarTime={dolarTime} onQuickSave={handleSave}/>}
        {tab==="registrar" &&<RegistrarTab onSave={handleSave} programados={programados} setProgramados={setProgramados}/>}
        {tab==="planes"    &&<PlanesTab planes={planes} setPlanes={setPlanes} avgAhorro={avgAhorro_}/>}
        {tab==="asesor"    &&<AsesorTab saldos={saldos} movs={movs} dolar={dolar} planes={planes}/>}
        {tab==="coach"     &&<CoachTab saldos={saldos} movs={movs} dolar={dolar} planes={planes}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(6,10,14,0.8)",backdropFilter:"blur(40px) saturate(1.8)",WebkitBackdropFilter:"blur(40px) saturate(1.8)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",paddingBottom:"max(env(safe-area-inset-bottom,0px),14px)",zIndex:10}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"9px 0",color:tab===n.id?C.teal:C.muted,transition:"color 0.2s",fontFamily:"DM Sans, sans-serif"}}>
            <span style={{fontSize:tab===n.id?21:19,transition:"font-size 0.2s",filter:tab===n.id?"drop-shadow(0 0 8px "+C.teal+")":"none"}}>{n.emoji}</span>
            <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.05em"}}>{n.label}</span>
          </button>
        ))}
      </div>
      {pendientes.length>0&&<ConfirmacionModal pendiente={pendientes[0]} onConfirm={handleConfirmar} onSaltar={handleSaltar}/>}
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
